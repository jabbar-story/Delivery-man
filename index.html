
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LogiLink - إدارة الطلبات</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDKs (Modular) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, updateDoc, doc, onSnapshot, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Firebase Setup ---
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            // Placeholder config to prevent errors if running outside environment
            apiKey: "dummy", projectId: "dummy", appId: "dummy"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'logilink-html-app';

        // --- Global State Variables ---
        let appUser = null;
        let allUsers = [];
        let allOrders = [];
        let allOffers = [];

        // Constants
        const ADMIN_PHONE = '01223881051';

        // DOM Elements
        const screens = {
            auth: document.getElementById('auth-screen'),
            main: document.getElementById('main-screen')
        };
        const panels = {
            admin: document.getElementById('admin-panel'),
            merchant: document.getElementById('merchant-panel'),
            delivery: document.getElementById('delivery-panel'),
            client: document.getElementById('client-panel')
        };
        
        // --- Utilities ---
        window.showToast = function(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `fixed top-4 left-1/2 -translate-x-1/2 px-4 py-2 text-white text-sm font-bold rounded-xl shadow-lg z-[100] transition-all duration-300 transform ${type === 'error' ? 'bg-rose-600' : 'bg-emerald-600'} opacity-100 translate-y-0`;
            setTimeout(() => {
                toast.className = 'fixed top-4 left-1/2 -translate-x-1/2 px-4 py-2 text-white text-sm font-bold rounded-xl shadow-lg z-[100] transition-all duration-300 transform opacity-0 -translate-y-4 pointer-events-none';
            }, 3000);
        };

        window.openWhatsApp = function(phone, text) {
            let formattedPhone = phone;
            if(phone.startsWith('0')) formattedPhone = '2' + phone; // Add country code if missing
            window.open(`https://wa.me/${formattedPhone}?text=${encodeURIComponent(text)}`, '_blank');
        };

        window.shareLink = function(title, text, url) {
            if (navigator.share) {
                navigator.share({ title, text, url }).catch(console.error);
            } else {
                // Fallback to copy to clipboard
                const input = document.createElement('input');
                input.value = url;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                window.showToast("تم نسخ الرابط");
            }
        };

        // --- Auth & Init ---
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) { console.error("Auth error:", e); }
        };

        initAuth();

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Setup Realtime Listeners
                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'users'), (snapshot) => {
                    allUsers = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                });

                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'orders'), (snapshot) => {
                    allOrders = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })).sort((a,b) => b.createdAt - a.createdAt);
                    if(appUser) renderUIBasedOnRole();
                });

                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'offers'), (snapshot) => {
                    allOffers = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })).sort((a,b) => b.createdAt - a.createdAt);
                    if(appUser) renderUIBasedOnRole();
                });
            }
        });

        // --- Login / Register Logic ---
        window.toggleAuthMode = function(mode) {
            document.getElementById('login-form').classList.toggle('hidden', mode === 'register');
            document.getElementById('register-form').classList.toggle('hidden', mode === 'login');
            
            document.getElementById('btn-mode-login').classList.toggle('bg-white', mode === 'login');
            document.getElementById('btn-mode-login').classList.toggle('text-indigo-600', mode === 'login');
            document.getElementById('btn-mode-login').classList.toggle('shadow', mode === 'login');
            
            document.getElementById('btn-mode-register').classList.toggle('bg-white', mode === 'register');
            document.getElementById('btn-mode-register').classList.toggle('text-indigo-600', mode === 'register');
            document.getElementById('btn-mode-register').classList.toggle('shadow', mode === 'register');
        };

        window.handleLogin = async function(e) {
            e.preventDefault();
            const phoneInput = document.getElementById('login-phone').value.trim();
            
            const foundUser = allUsers.find(u => u.phone === phoneInput);
            
            if (phoneInput === ADMIN_PHONE) {
                if (!foundUser) {
                    const adminObj = { phone: ADMIN_PHONE, name: 'مدير النظام', role: 'admin', createdAt: Date.now() };
                    const docRef = await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'users'), adminObj);
                    appUser = { id: docRef.id, ...adminObj };
                } else {
                    appUser = foundUser;
                }
                loginSuccess();
            } else if (foundUser) {
                appUser = foundUser;
                loginSuccess();
            } else {
                window.showToast("رقم الهاتف غير مسجل", "error");
            }
        };

        window.handleRegister = async function(e) {
            e.preventDefault();
            const name = document.getElementById('reg-name').value.trim();
            const phone = document.getElementById('reg-phone').value.trim();
            const whatsapp = document.getElementById('reg-whatsapp').value.trim();

            if (allUsers.find(u => u.phone === phone)) {
                window.showToast("هذا الرقم مسجل بالفعل", "error");
                return;
            }

            try {
                const newClient = { name, phone, whatsapp, role: 'client', createdAt: Date.now() };
                const docRef = await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'users'), newClient);
                appUser = { id: docRef.id, ...newClient };
                window.showToast("تم إنشاء الحساب بنجاح");
                loginSuccess();
            } catch (err) {
                window.showToast("حدث خطأ", "error");
            }
        };

        function loginSuccess() {
            screens.auth.classList.add('hidden');
            screens.main.classList.remove('hidden');
            
            // Set Header Info
            const roleNames = { 'admin': 'مدير', 'merchant': 'متجر', 'delivery': 'كابتن ريس', 'client': 'عميل' };
            document.getElementById('header-role').textContent = roleNames[appUser.role] || '';
            document.getElementById('header-name').textContent = appUser.name;

            renderUIBasedOnRole();
        }

        window.logout = function() {
            appUser = null;
            screens.auth.classList.remove('hidden');
            screens.main.classList.add('hidden');
            
            // Clear inputs
            document.getElementById('login-phone').value = '';
            document.getElementById('reg-name').value = '';
            document.getElementById('reg-phone').value = '';
            document.getElementById('reg-whatsapp').value = '';
        };

        // --- Core Rendering Logic ---
        function renderUIBasedOnRole() {
            // Hide all panels first
            Object.values(panels).forEach(p => p.classList.add('hidden'));

            if (appUser.role === 'admin') {
                panels.admin.classList.remove('hidden');
                renderAdminPanel();
            } else if (appUser.role === 'merchant') {
                panels.merchant.classList.remove('hidden');
                renderMerchantPanel();
            } else if (appUser.role === 'delivery') {
                panels.delivery.classList.remove('hidden');
                renderDeliveryPanel();
            } else if (appUser.role === 'client') {
                panels.client.classList.remove('hidden');
                renderClientPanel();
            }
            lucide.createIcons();
        }

        // --- Helper: Status Badge HTML ---
        function getStatusBadge(status) {
            const styles = {
                'قيد التجهيز': 'bg-gray-100 text-gray-600',
                'في انتظار التوصيل': 'bg-amber-50 text-amber-600',
                'خرج للتوصيل': 'bg-indigo-50 text-indigo-600',
                'تم التسليم': 'bg-emerald-50 text-emerald-600'
            };
            const style = styles[status] || 'bg-gray-100 text-gray-600';
            return `<span class="px-2 py-1 rounded-md text-[10px] font-bold ${style}">${status}</span>`;
        }

        // ==========================================
        // 1. ADMIN PANEL
        // ==========================================
        window.toggleAdminAddForm = function() {
            const form = document.getElementById('admin-add-form');
            form.classList.toggle('hidden');
        };

        window.toggleAdminRoleFields = function() {
            const role = document.getElementById('admin-new-role').value;
            document.getElementById('admin-logo-field').classList.toggle('hidden', role !== 'merchant');
        };

        window.adminAddUser = async function() {
            const name = document.getElementById('admin-new-name').value;
            const phone = document.getElementById('admin-new-phone').value;
            const role = document.getElementById('admin-new-role').value;
            const logoUrl = document.getElementById('admin-new-logo').value;

            if (!name || !phone) return window.showToast("أدخل الاسم ورقم الهاتف", "error");
            if (role === 'delivery' && phone.length < 10) return window.showToast("رقم هاتف المندوب غير صحيح", "error");

            const newUser = { name, phone, role, createdAt: Date.now() };
            if (role === 'merchant' && logoUrl) newUser.logoUrl = logoUrl;

            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'users'), newUser);
            window.showToast("تمت الإضافة");
            
            // Reset
            document.getElementById('admin-new-name').value = '';
            document.getElementById('admin-new-phone').value = '';
            document.getElementById('admin-new-logo').value = '';
            toggleAdminAddForm();
        };

        window.adminDeleteUser = async function(id) {
            if(confirm("تأكيد الحذف؟")) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', id));
                window.showToast("تم الحذف");
            }
        };

        window.renderAdminPanel = function() {
            const list = document.getElementById('admin-users-list');
            const search = document.getElementById('admin-search').value.toLowerCase();
            
            const filtered = allUsers.filter(u => u.name.toLowerCase().includes(search) || u.phone.includes(search));
            
            list.innerHTML = filtered.map(u => {
                let iconHtml = '';
                let bgClass = 'bg-gray-100 text-gray-600';
                
                if (u.role === 'merchant') {
                    bgClass = 'bg-indigo-50 text-indigo-600';
                    iconHtml = u.logoUrl 
                        ? `<img src="${u.logoUrl}" class="w-5 h-5 object-cover rounded-full" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' viewBox=\\'0 0 24 24\\' fill=\\'none\\' stroke=\\'currentColor\\' stroke-width=\\'2\\' stroke-linecap=\\'round\\' stroke-linejoin=\\'round\\'><path d=\\'m2 7 4.41-4.41A2 2 0 0 1 7.83 2h8.34a2 2 0 0 1 1.42.59L22 7\\'/><path d=\\'M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8\\'/><path d=\\'M15 22v-4a2 2 0 0 0-2-2h-2a2 2 0 0 0-2 2v4\\'/><path d=\\'M2 7h20\\'/><path d=\\'M22 7v3a2 2 0 0 1-2 2v0a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 16 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 12 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 8 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 4 12v0a2 2 0 0 1-2-2V7\\'/></svg>'">` 
                        : `<i data-lucide="store" class="w-4 h-4"></i>`;
                } else if (u.role === 'delivery') {
                    bgClass = 'bg-emerald-50 text-emerald-600';
                    // Racing bike svg string
                    iconHtml = `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="5.5" cy="17.5" r="3.5"/><circle cx="18.5" cy="17.5" r="3.5"/><path d="M15 6a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm-3 11.5V14l-3-3 4-3 2 3h2"/><path d="M7.5 12.5 9 10l2 2"/><path d="M11 6.5h4l2 3.5h3"/></svg>`;
                } else {
                    iconHtml = `<i data-lucide="user" class="w-4 h-4"></i>`;
                }

                return `
                <div class="p-3 flex justify-between items-center hover:bg-gray-50 border-b border-gray-50 last:border-0">
                    <div class="flex items-center gap-3">
                        <div class="p-2 rounded-xl ${bgClass}">${iconHtml}</div>
                        <div>
                            <p class="font-bold text-sm text-gray-800">${u.name}</p>
                            <p class="text-xs text-gray-500">${u.phone}</p>
                        </div>
                    </div>
                    ${u.phone !== ADMIN_PHONE ? `<button onclick="adminDeleteUser('${u.id}')" class="text-rose-500 p-2 hover:bg-rose-50 rounded-lg"><i data-lucide="trash-2" class="w-4 h-4"></i></button>` : ''}
                </div>
                `;
            }).join('');
        };


        // ==========================================
        // 2. MERCHANT PANEL
        // ==========================================
        let merchantActiveTab = 'orders';
        
        window.switchMerchantTab = function(tab) {
            merchantActiveTab = tab;
            document.getElementById('merchant-orders-view').classList.toggle('hidden', tab !== 'orders');
            document.getElementById('merchant-offers-view').classList.toggle('hidden', tab !== 'offers');
            
            document.getElementById('tab-orders').classList.toggle('bg-white', tab === 'orders');
            document.getElementById('tab-orders').classList.toggle('shadow-sm', tab === 'orders');
            document.getElementById('tab-orders').classList.toggle('text-indigo-600', tab === 'orders');
            document.getElementById('tab-orders').classList.toggle('text-gray-500', tab !== 'orders');

            document.getElementById('tab-offers').classList.toggle('bg-white', tab === 'offers');
            document.getElementById('tab-offers').classList.toggle('shadow-sm', tab === 'offers');
            document.getElementById('tab-offers').classList.toggle('text-indigo-600', tab === 'offers');
            document.getElementById('tab-offers').classList.toggle('text-gray-500', tab !== 'offers');
        };

        window.merchantSaveOrder = async function(e) {
            e.preventDefault();
            const form = document.getElementById('merchant-order-form');
            const data = {
                client: document.getElementById('mo-client').value,
                phone: document.getElementById('mo-phone').value,
                whatsappNumber: document.getElementById('mo-whatsapp').value,
                address: document.getElementById('mo-address').value,
                price: document.getElementById('mo-price').value,
                merchantId: appUser.id,
                merchantName: appUser.name,
                status: 'قيد التجهيز',
                createdAt: Date.now()
            };

            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'orders'), data);
            window.showToast("تم إضافة الأوردر");
            form.reset();
        };

        window.merchantPushOrder = async function(id) {
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'orders', id), {status: 'في انتظار التوصيل'});
            window.showToast("تم الإرسال للمناديب");
        };

        window.merchantSaveOffer = async function(e) {
            e.preventDefault();
            const form = document.getElementById('merchant-offer-form');
            const data = {
                title: document.getElementById('mf-title').value,
                description: document.getElementById('mf-desc').value,
                imageUrl: document.getElementById('mf-img').value,
                price: document.getElementById('mf-price').value,
                merchantId: appUser.id,
                merchantName: appUser.name,
                merchantWhatsApp: appUser.phone,
                createdAt: Date.now()
            };

            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'offers'), data);
            window.showToast("تم نشر العرض");
            form.reset();
        };

        window.renderMerchantPanel = function() {
            const myOrders = allOrders.filter(o => o.merchantId === appUser.id);
            const myOffers = allOffers.filter(o => o.merchantId === appUser.id);

            // Render Orders
            document.getElementById('merchant-orders-list').innerHTML = myOrders.map(o => `
                <div class="bg-white p-4 rounded-2xl border border-gray-100 flex flex-col gap-3">
                    <div class="flex justify-between items-center">
                        <span class="font-bold text-gray-800 text-sm">${o.client}</span>
                        ${getStatusBadge(o.status)}
                    </div>
                    <div class="flex justify-between items-end">
                        <div class="text-xs text-gray-500 space-y-1">
                            <p class="flex items-center gap-1"><i data-lucide="map-pin" class="w-3 h-3"></i> ${o.address}</p>
                            <p class="font-bold text-indigo-600">${o.price} ج.م</p>
                        </div>
                        ${o.status === 'قيد التجهيز' ? `<button onclick="merchantPushOrder('${o.id}')" class="bg-amber-500 text-white px-3 py-1.5 rounded-lg text-xs font-bold active:scale-95 transition-transform">إرسال للمناديب</button>` : ''}
                    </div>
                </div>
            `).join('');

            // Render Offers
            const originUrl = window.location.origin + window.location.pathname;
            document.getElementById('merchant-offers-list').innerHTML = myOffers.map(o => `
                <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
                    ${o.imageUrl ? `<img src="${o.imageUrl}" onerror="this.style.display='none'" alt="offer" class="w-full h-32 object-cover" />` : ''}
                    <div class="p-3">
                        <h4 class="font-bold text-sm text-gray-800">${o.title}</h4>
                        <p class="text-xs text-gray-500 mt-1 line-clamp-2">${o.description}</p>
                        <div class="flex justify-between items-center mt-3">
                            <span class="text-emerald-600 font-bold text-sm">${o.price} ج.م</span>
                            <button onclick="shareLink('${o.title}', '${o.description}', '${originUrl}?offer=${o.id}')" class="text-gray-400 p-1.5 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg"><i data-lucide="share-2" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
        };


        // ==========================================
        // 3. DELIVERY PANEL
        // ==========================================
        window.deliveryTakeOrder = async function(id) {
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'orders', id), {
                status: 'خرج للتوصيل', deliveryId: appUser.id, deliveryName: appUser.name
            });
            window.showToast("تم استلام الأوردر");
        };

        window.deliveryFinishOrder = async function(id) {
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'orders', id), { status: 'تم التسليم' });
            window.showToast("عاش يا كابتن! تم التوصيل");
        };

        window.renderDeliveryPanel = function() {
            const available = allOrders.filter(o => o.status === 'في انتظار التوصيل');
            const myCurrent = allOrders.filter(o => o.deliveryId === appUser.id && o.status === 'خرج للتوصيل');

            const currentContainer = document.getElementById('delivery-current-tasks');
            if (myCurrent.length > 0) {
                currentContainer.classList.remove('hidden');
                document.getElementById('delivery-current-list').innerHTML = myCurrent.map(o => `
                    <div class="bg-gradient-to-br from-emerald-600 to-emerald-800 text-white p-4 rounded-2xl shadow-lg flex flex-col gap-3">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="text-emerald-100 text-xs">توصيل إلى</p>
                                <h4 class="text-lg font-bold">${o.client}</h4>
                            </div>
                            <div class="bg-white/20 px-3 py-1 rounded-lg text-center">
                                <p class="text-[10px] opacity-90">التحصيل</p>
                                <p class="font-bold text-sm">${o.price} ج.م</p>
                            </div>
                        </div>
                        <p class="text-xs flex items-center gap-1"><i data-lucide="map-pin" class="w-3 h-3"></i> ${o.address}</p>
                        <div class="flex gap-2 mt-2">
                            <a href="tel:${o.phone}" class="flex-1 flex items-center justify-center gap-2 py-2 bg-white/20 rounded-xl text-xs font-bold hover:bg-white/30"><i data-lucide="phone" class="w-4 h-4"></i> اتصال</a>
                            <button onclick="openWhatsApp('${o.whatsappNumber}', 'مرحباً ${o.client}، أنا مندوب التوصيل في طريقي إليك.')" class="flex-1 flex items-center justify-center gap-2 py-2 bg-[#25D366] rounded-xl text-xs font-bold hover:bg-[#20b858]"><i data-lucide="message-circle" class="w-4 h-4"></i> واتساب</button>
                        </div>
                        <button onclick="deliveryFinishOrder('${o.id}')" class="w-full py-2.5 mt-2 bg-white text-emerald-700 rounded-xl font-bold text-sm shadow-md active:scale-95 transition-transform">إنهاء وتم التسليم</button>
                    </div>
                `).join('');
            } else {
                currentContainer.classList.add('hidden');
            }

            document.getElementById('delivery-available-count').textContent = available.length;
            document.getElementById('delivery-available-list').innerHTML = available.map(o => `
                <div class="bg-white p-4 rounded-2xl border border-gray-100 flex justify-between items-center">
                    <div class="space-y-1">
                        <span class="text-[10px] bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded-md font-bold">متجر: ${o.merchantName}</span>
                        <h4 class="font-bold text-gray-800 text-sm">${o.address}</h4>
                        <p class="text-emerald-600 font-bold text-xs">${o.price} ج.م</p>
                    </div>
                    <button onclick="deliveryTakeOrder('${o.id}')" class="bg-indigo-600 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-md active:scale-95 transition-transform">
                        استلام
                    </button>
                </div>
            `).join('');
        };


        // ==========================================
        // 4. CLIENT PANEL
        // ==========================================
        window.renderClientPanel = function() {
            const originUrl = window.location.origin + window.location.pathname;
            document.getElementById('client-offers-list').innerHTML = allOffers.map(o => `
                <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden shadow-sm">
                    ${o.imageUrl 
                        ? `<img src="${o.imageUrl}" onerror="this.style.display='none'" alt="${o.title}" class="w-full h-40 object-cover" />` 
                        : `<div class="w-full h-24 bg-gray-50 flex items-center justify-center text-gray-300"><i data-lucide="image" class="w-8 h-8"></i></div>`
                    }
                    <div class="p-4 space-y-2">
                        <div class="flex justify-between items-start gap-2">
                            <h3 class="font-bold text-gray-800 text-sm leading-tight">${o.title}</h3>
                            <span class="bg-emerald-50 text-emerald-600 text-xs font-bold px-2 py-1 rounded-md whitespace-nowrap">${o.price} ج.م</span>
                        </div>
                        <p class="text-xs text-gray-500 line-clamp-2">${o.description}</p>
                        <p class="text-[10px] font-bold text-indigo-500 flex items-center gap-1"><i data-lucide="store" class="w-3 h-3"></i> ${o.merchantName}</p>
                        <div class="flex gap-2 pt-2 border-t border-gray-50">
                            <button onclick="openWhatsApp('${o.merchantWhatsApp}', 'مرحباً، أريد طلب هذا العرض: ${o.title}')" class="flex-1 bg-[#25D366] hover:bg-[#20b858] text-white py-2 rounded-xl text-xs font-bold flex items-center justify-center gap-1 transition-colors">
                                <i data-lucide="message-circle" class="w-4 h-4"></i> اطلب الآن
                            </button>
                            <button onclick="shareLink('عرض من ${o.merchantName}', '${o.title}', '${originUrl}?offer=${o.id}')" class="p-2 bg-gray-50 text-gray-600 rounded-xl hover:bg-gray-100 active:scale-95">
                                <i data-lucide="share-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        };

    </script>
    <style>
        /* Custom Scrollbar for a cleaner look */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .animate-ring { animation: ring 2s ease infinite; }
        @keyframes ring {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(10deg); }
            50% { transform: rotate(-10deg); }
            75% { transform: rotate(5deg); }
        }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800 antialiased selection:bg-indigo-100 selection:text-indigo-900">

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-4 left-1/2 -translate-x-1/2 px-4 py-2 text-white text-sm font-bold rounded-xl shadow-lg z-[100] opacity-0 -translate-y-4 pointer-events-none transition-all duration-300"></div>

    <!-- ============================================== -->
    <!-- AUTH SCREEN -->
    <!-- ============================================== -->
    <div id="auth-screen" class="min-h-[100dvh] flex items-center justify-center p-4">
        <div class="w-full max-w-sm bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
            <!-- Header area -->
            <div class="bg-indigo-600 p-8 text-center">
                <div class="bg-white/20 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 backdrop-blur-sm">
                    <i data-lucide="package" class="w-8 h-8 text-white"></i>
                </div>
                <h1 class="text-2xl font-black text-white tracking-tight">LogiLink</h1>
                <p class="text-indigo-100 mt-1 text-xs font-medium opacity-90">منصة الإدارة والخدمات اللوجستية</p>
            </div>
            
            <div class="p-6">
                <!-- Toggle Mode -->
                <div class="flex gap-2 mb-6 bg-gray-100 p-1 rounded-xl">
                    <button id="btn-mode-login" onclick="toggleAuthMode('login')" class="flex-1 py-2 text-sm font-bold rounded-lg transition-all bg-white shadow text-indigo-600">تسجيل الدخول</button>
                    <button id="btn-mode-register" onclick="toggleAuthMode('register')" class="flex-1 py-2 text-sm font-bold rounded-lg transition-all text-gray-500">عميل جديد</button>
                </div>

                <!-- Login Form -->
                <form id="login-form" onsubmit="handleLogin(event)" class="space-y-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-gray-500 px-1 uppercase tracking-wider">رقم الهاتف</label>
                        <input id="login-phone" type="tel" required class="w-full p-3 bg-gray-50 rounded-xl outline-none focus:ring-2 ring-indigo-500/20 text-center font-bold tabular-nums text-lg border border-transparent focus:border-indigo-100 transition-all placeholder:font-normal placeholder:text-gray-300" placeholder="01xxxxxxxxx">
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-xl font-bold text-sm shadow-lg shadow-indigo-200 transition-all active:scale-95">دخول</button>
                </form>

                <!-- Register Form -->
                <form id="register-form" onsubmit="handleRegister(event)" class="space-y-3 hidden">
                    <input id="reg-name" required placeholder="الاسم بالكامل" class="w-full p-3 bg-gray-50 border border-transparent focus:border-indigo-100 rounded-xl text-sm outline-none focus:ring-2 ring-indigo-500/20 transition-all">
                    <input id="reg-phone" type="tel" required placeholder="رقم الهاتف الأساسي" class="w-full p-3 bg-gray-50 border border-transparent focus:border-indigo-100 rounded-xl text-sm outline-none focus:ring-2 ring-indigo-500/20 transition-all tabular-nums text-left dir-ltr" dir="ltr">
                    <input id="reg-whatsapp" type="tel" required placeholder="رقم الواتساب للتواصل" class="w-full p-3 bg-gray-50 border border-transparent focus:border-indigo-100 rounded-xl text-sm outline-none focus:ring-2 ring-indigo-500/20 transition-all tabular-nums text-left dir-ltr" dir="ltr">
                    <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-3 rounded-xl font-bold text-sm shadow-lg shadow-emerald-200 mt-2 transition-all active:scale-95">تأكيد وإنشاء الحساب</button>
                </form>
            </div>
        </div>
    </div>


    <!-- ============================================== -->
    <!-- MAIN APPLICATION SCREEN -->
    <!-- ============================================== -->
    <div id="main-screen" class="hidden min-h-[100dvh] flex flex-col">
        
        <!-- Navbar -->
        <nav class="bg-white border-b border-gray-100 sticky top-0 z-40 p-3 shadow-sm">
            <div class="max-w-4xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <div class="bg-indigo-600 p-1.5 rounded-lg"><i data-lucide="package" class="w-5 h-5 text-white"></i></div>
                    <span class="font-bold text-gray-800 tracking-tight text-lg">LogiLink</span>
                </div>
                <div class="flex items-center gap-3">
                    <div class="text-left leading-tight hidden sm:block">
                        <p id="header-role" class="text-[10px] font-bold text-indigo-500"></p>
                        <p id="header-name" class="text-sm font-bold text-gray-800"></p>
                    </div>
                    <button onclick="logout()" class="p-2 bg-rose-50 text-rose-500 hover:bg-rose-100 rounded-lg transition-colors"><i data-lucide="log-out" class="w-4 h-4"></i></button>
                </div>
            </div>
        </nav>

        <!-- Dynamic Content Container -->
        <main class="flex-1 max-w-4xl w-full mx-auto p-4 md:p-6 pb-20">
            
            <!-- 1. ADMIN PANEL -->
            <div id="admin-panel" class="hidden space-y-4">
                <div class="flex justify-between items-center bg-white p-3 rounded-2xl shadow-sm border border-gray-100">
                    <h2 class="text-base font-bold flex items-center gap-2 text-gray-800"><i data-lucide="shield" class="w-5 h-5 text-indigo-600"></i> لوحة الإدارة</h2>
                    <button onclick="toggleAdminAddForm()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-1.5 rounded-xl text-xs font-bold flex items-center gap-1 transition-colors">
                        <i data-lucide="plus" class="w-3.5 h-3.5"></i> إضافة عضو
                    </button>
                </div>

                <div id="admin-add-form" class="hidden bg-white p-4 rounded-2xl border border-indigo-100 shadow-sm space-y-3">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                        <input id="admin-new-name" placeholder="الاسم" class="p-2.5 bg-gray-50 rounded-xl text-sm outline-none focus:ring-2 ring-indigo-500/20">
                        <input id="admin-new-phone" type="tel" placeholder="رقم الهاتف (مطلوب للمندوب)" class="p-2.5 bg-gray-50 rounded-xl text-sm outline-none focus:ring-2 ring-indigo-500/20 dir-ltr" dir="ltr">
                        <select id="admin-new-role" onchange="toggleAdminRoleFields()" class="p-2.5 bg-gray-50 rounded-xl text-sm outline-none focus:ring-2 ring-indigo-500/20">
                            <option value="merchant">متجر / تاجر</option>
                            <option value="delivery">مندوب توصيل (ريس)</option>
                        </select>
                        <input id="admin-new-logo" placeholder="رابط صورة لوجو المتجر (اختياري)" class="p-2.5 bg-gray-50 rounded-xl text-sm outline-none focus:ring-2 ring-indigo-500/20">
                    </div>
                    <button onclick="adminAddUser()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2 rounded-xl text-sm font-bold transition-colors">حفظ البيانات</button>
                </div>

                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="p-3 bg-gray-50 flex items-center gap-2 border-b border-gray-100">
                        <i data-lucide="search" class="w-4 h-4 text-gray-400"></i>
                        <input id="admin-search" onkeyup="renderAdminPanel()" placeholder="بحث بالاسم أو الرقم..." class="bg-transparent outline-none w-full text-sm placeholder:text-gray-400">
                    </div>
                    <div id="admin-users-list" class="divide-y divide-gray-50"></div>
                </div>
            </div>

            <!-- 2. MERCHANT PANEL -->
            <div id="merchant-panel" class="hidden space-y-4">
                <div class="flex gap-2 p-1 bg-gray-100 rounded-xl">
                    <button id="tab-orders" onclick="switchMerchantTab('orders')" class="flex-1 py-2 text-sm font-bold rounded-lg bg-white shadow-sm text-indigo-600 transition-all">الأوردرات</button>
                    <button id="tab-offers" onclick="switchMerchantTab('offers')" class="flex-1 py-2 text-sm font-bold rounded-lg text-gray-500 transition-all">العروض</button>
                </div>

                <!-- Orders View -->
                <div id="merchant-orders-view" class="space-y-4">
                    <form id="merchant-order-form" onsubmit="merchantSaveOrder(event)" class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 space-y-3">
                        <h3 class="font-bold text-sm text-gray-800 border-b border-gray-50 pb-2 mb-1">تسجيل أوردر جديد</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                            <input id="mo-client" required placeholder="اسم العميل" class="p-2.5 bg-gray-50 rounded-xl text-sm outline-none focus:ring-2 ring-indigo-500/20">
                            <input id="mo-phone" required type="tel" placeholder="رقم الهاتف" class="p-2.5 bg-gray-50 rounded-xl text-sm outline-none focus:ring-2 ring-indigo-500/20 dir-ltr" dir="ltr">
                            <input id="mo-whatsapp" required type="tel" placeholder="رقم واتساب العميل (للتواصل)" class="p-2.5 bg-gray-50 rounded-xl text-sm outline-none focus:ring-2 ring-indigo-500/20 dir-ltr" dir="ltr">
                            <input id="mo-address" required placeholder="العنوان بالتفصيل" class="p-2.5 bg-gray-50 rounded-xl text-sm outline-none focus:ring-2 ring-indigo-500/20">
                            <input id="mo-price" required type="number" placeholder="المبلغ المطلوب تحصيله (ج.م)" class="p-2.5 bg-gray-50 rounded-xl text-sm outline-none focus:ring-2 ring-indigo-500/20 md:col-span-2">
                        </div>
                        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2.5 rounded-xl font-bold text-sm mt-1 transition-colors">حفظ الأوردر</button>
                    </form>
                    <div id="merchant-orders-list" class="space-y-3"></div>
                </div>

                <!-- Offers View -->
                <div id="merchant-offers-view" class="hidden space-y-4">
                    <form id="merchant-offer-form" onsubmit="merchantSaveOffer(event)" class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 space-y-3">
                        <input id="mf-title" required placeholder="عنوان العرض (مثال: خصم 50% على الوجبات)" class="w-full p-2.5 bg-gray-50 rounded-xl text-sm outline-none focus:ring-2 ring-indigo-500/20">
                        <textarea id="mf-desc" required placeholder="وصف العرض والتفاصيل..." class="w-full p-2.5 bg-gray-50 rounded-xl text-sm outline-none focus:ring-2 ring-indigo-500/20 min-h-[80px] resize-y"></textarea>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                            <input id="mf-img" placeholder="رابط صورة العرض (اختياري)" class="w-full p-2.5 bg-gray-50 rounded-xl text-sm outline-none focus:ring-2 ring-indigo-500/20">
                            <input id="mf-price" required placeholder="السعر بعد الخصم (ج.م)" class="w-full p-2.5 bg-gray-50 rounded-xl text-sm outline-none focus:ring-2 ring-indigo-500/20">
                        </div>
                        <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-2.5 rounded-xl font-bold text-sm transition-colors">نشر العرض للعملاء</button>
                    </form>
                    <div id="merchant-offers-list" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
                </div>
            </div>

            <!-- 3. DELIVERY PANEL -->
            <div id="delivery-panel" class="hidden space-y-6">
                <!-- Current Task -->
                <div id="delivery-current-tasks" class="hidden space-y-3">
                    <h3 class="font-bold text-gray-800 text-sm flex items-center gap-2">
                        <svg class="w-5 h-5 text-emerald-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="5.5" cy="17.5" r="3.5"/><circle cx="18.5" cy="17.5" r="3.5"/><path d="M15 6a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm-3 11.5V14l-3-3 4-3 2 3h2"/><path d="M7.5 12.5 9 10l2 2"/><path d="M11 6.5h4l2 3.5h3"/></svg> 
                        مهامك الحالية
                    </h3>
                    <div id="delivery-current-list" class="space-y-3"></div>
                </div>

                <!-- Available Tasks -->
                <div class="space-y-3">
                    <h3 class="font-bold text-gray-800 text-sm border-b border-gray-100 pb-2">طلبات متاحة (<span id="delivery-available-count">0</span>)</h3>
                    <div id="delivery-available-list" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
                </div>
            </div>

            <!-- 4. CLIENT PANEL -->
            <div id="client-panel" class="hidden space-y-4">
                <h2 class="font-bold text-lg text-gray-800 mb-2">أحدث العروض والمتاجر</h2>
                <div id="client-offers-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
            </div>

        </main>
    </div>

</body>
</html>
